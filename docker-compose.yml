services:
  # ============================================================================
  # BACKEND (FastAPI + Supabase + Prometheus metrics)
  # ============================================================================
  backend:
    build:
      context: .
      dockerfile: ./Dockerfile.backend
    container_name: supachat-backend
    ports:
      - "8001:8000"
    environment:
      BACKEND_PORT: 8000
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
    networks:
      - supachat-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ============================================================================
  # FRONTEND (Next.js)
  # ============================================================================
  frontend:
    build:
      context: .
      dockerfile: ./Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: /api
    container_name: supachat-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: /api
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - supachat-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ============================================================================
  # NGINX (Reverse Proxy — / → frontend, /api → backend)
  # ============================================================================
  nginx:
    image: nginx:alpine
    container_name: supachat-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - supachat-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ============================================================================
  # PROMETHEUS (Metrics collection)
  # ============================================================================
  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: supachat-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - supachat-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped

  # ============================================================================
  # GRAFANA (Dashboards — CPU, memory, request latency, logs)
  # ============================================================================
  grafana:
    image: grafana/grafana:10.2.3
    container_name: supachat-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - supachat-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped

  # ============================================================================
  # LOKI (Log aggregation)
  # ============================================================================
  loki:
    image: grafana/loki:2.9.3
    container_name: supachat-loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yml
    networks:
      - supachat-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped

  # ============================================================================
  # PROMTAIL (Log shipper → Loki)
  # ============================================================================
  promtail:
    image: grafana/promtail:2.9.3
    container_name: supachat-promtail
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - supachat-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    restart: unless-stopped

  # ============================================================================
  # CADVISOR (Container metrics → Prometheus)
  # ============================================================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: supachat-cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - supachat-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    restart: unless-stopped

networks:
  supachat-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  loki-data:

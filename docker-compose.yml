services:
  # ============================================================================
  # BACKEND SERVICE (FastAPI)
  # ============================================================================
  backend:
    build:
      context: .
      dockerfile: ./Dockerfile.backend
    container_name: supachat-backend
    ports:
      - "8001:8000"
    environment:
      BACKEND_PORT: 8000
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
    networks:
      - supachat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # ============================================================================
  # FRONTEND SERVICE (Next.js)
  # ============================================================================
  frontend:
    build:
      context: .
      dockerfile: ./Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: /api
    container_name: supachat-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: /api
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - supachat-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # ============================================================================
  # NGINX REVERSE PROXY
  # ============================================================================
  nginx:
    image: nginx:alpine
    container_name: supachat-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - supachat-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ============================================================================
  # PROMETHEUS (Metrics Collection)
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: supachat-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - supachat-network
    restart: unless-stopped

  # ============================================================================
  # GRAFANA (Visualization)
  # ============================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: supachat-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: 'grafana-piechart-panel'
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - supachat-network
    restart: unless-stopped

  # ============================================================================
  # LOKI (Log Aggregation)
  # ============================================================================
  loki:
    image: grafana/loki:2.8.2
    container_name: supachat-loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yml
    networks:
      - supachat-network
    restart: unless-stopped

networks:
  supachat-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  loki-data:

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'supachat-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # ============================================================================
  # PROMETHEUS SELF-MONITORING
  # ============================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ============================================================================
  # BACKEND SERVICE METRICS
  # ============================================================================
  - job_name: 'backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # ============================================================================
  # DOCKER DAEMON METRICS (via cAdvisor if available)
  # ============================================================================
  - job_name: 'docker'
    static_configs:
      - targets: ['localhost:8080']
    metrics_path: '/metrics'
    scrape_interval: 15s

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: supachat-monitor

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: backend
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: [backend:8000]

  - job_name: cadvisor
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: [cadvisor:8080]

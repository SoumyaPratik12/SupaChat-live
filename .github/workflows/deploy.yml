name: Deploy SupaChat

on:
  push:
    branches: [main]

jobs:
  # ============================================================================
  # BUILD — verify Docker images build cleanly
  # ============================================================================
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f Dockerfile.backend -t supachat-backend:${{ github.sha }} .

      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t supachat-frontend:${{ github.sha }} .

  # ============================================================================
  # DEPLOY — SSH into EC2 and roll out new containers
  # ============================================================================
  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            REPO_DIR="$HOME/SupaChat-live"

            # Clone on first run, pull on subsequent runs
            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone https://github.com/${{ github.repository }}.git "$REPO_DIR"
            fi

            cd "$REPO_DIR"
            git fetch origin main
            git reset --hard origin/main

            # Write secrets into .env (never stored in repo)
            cat > .env <<EOF
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}
            SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
            BACKEND_PORT=8000
            NEXT_PUBLIC_API_URL=/api
            EOF

            # Rolling restart — rebuild only changed images, keep others up
            docker compose pull --quiet || true
            docker compose up -d --build --remove-orphans

            # Prune dangling images to save disk space
            docker image prune -f

  # ============================================================================
  # HEALTH CHECK — verify the deployment is live
  # ============================================================================
  health-check:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for containers to stabilise
        run: sleep 20

      - name: Check backend health
        run: |
          curl -f --retry 5 --retry-delay 5 \
            http://${{ secrets.EC2_HOST }}/api/health \
            && echo "✅ Backend healthy" \
            || echo "⚠️  Backend health check pending"

      - name: Check frontend health
        run: |
          curl -f --retry 5 --retry-delay 5 \
            http://${{ secrets.EC2_HOST }} \
            && echo "✅ Frontend healthy" \
            || echo "⚠️  Frontend health check pending"

name: Deploy SupaChat

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f Dockerfile.backend -t supachat-backend:${{ github.sha }} .

      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t supachat-frontend:${{ github.sha }} .

      - name: Confirm images built
        run: |
          docker images | grep supachat
          echo "✅ Both images built successfully"

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        with:
          host: 13.239.134.4    # MUST be correct
          username: ec2-user               # 🔥 FIXED (do not depend on secret)
          key: ${{ secrets.EC2_SSH_KEY }}  # MUST contain full .pem
          port: 22
          timeout: 60s
          command_timeout: 20m
          envs: SUPABASE_URL,SUPABASE_KEY,SUPABASE_SERVICE_KEY
          script: |
            set -e
            REPO_DIR="$HOME/SupaChat-live"

            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone https://github.com/${{ github.repository }}.git "$REPO_DIR"
            fi

            cd "$REPO_DIR"
            git fetch origin main
            git reset --hard origin/main

            printf 'SUPABASE_URL=%s\n' "$SUPABASE_URL" > .env
            printf 'SUPABASE_KEY=%s\n' "$SUPABASE_KEY" >> .env
            printf 'SUPABASE_SERVICE_KEY=%s\n' "$SUPABASE_SERVICE_KEY" >> .env
            printf 'BACKEND_PORT=8000\n' >> .env
            printf 'NEXT_PUBLIC_API_URL=/api\n' >> .env

            if docker compose version &>/dev/null 2>&1; then
              COMPOSE="docker compose"
            else
              COMPOSE="docker-compose"
            fi

            $COMPOSE up -d --build --remove-orphans
            docker image prune -f

            echo "✅ Deployment complete — $(date)"
            $COMPOSE ps

  health-check:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for containers
        run: sleep 30

      - name: Check Nginx
        run: curl -f http://${{ secrets.EC2_HOST }} || exit 1

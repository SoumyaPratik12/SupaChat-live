name: Deploy SupaChat

on:
  push:
    branches: [main]

jobs:
  # ============================================================================
  # BUILD — verify both Docker images compile cleanly
  # ============================================================================
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f Dockerfile.backend -t supachat-backend:${{ github.sha }} .

      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t supachat-frontend:${{ github.sha }} .

  # ============================================================================
  # DEPLOY — SSH into EC2 and roll out updated containers
  # ============================================================================
  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: SUPABASE_URL,SUPABASE_KEY,SUPABASE_SERVICE_KEY
          script: |
            set -e
            REPO_DIR="$HOME/SupaChat-live"

            # Clone on first run, pull on subsequent runs
            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone https://github.com/${{ github.repository }}.git "$REPO_DIR"
            fi

            cd "$REPO_DIR"
            git fetch origin main
            git reset --hard origin/main

            # Write .env — no heredoc indentation issues
            printf 'SUPABASE_URL=%s\n' "$SUPABASE_URL"         > .env
            printf 'SUPABASE_KEY=%s\n' "$SUPABASE_KEY"        >> .env
            printf 'SUPABASE_SERVICE_KEY=%s\n' "$SUPABASE_SERVICE_KEY" >> .env
            printf 'BACKEND_PORT=8000\n'                       >> .env
            printf 'NEXT_PUBLIC_API_URL=/api\n'                >> .env

            # Rebuild and restart only changed services
            docker compose up -d --build --remove-orphans

            # Clean up dangling images
            docker image prune -f

  # ============================================================================
  # HEALTH CHECK — confirm deployment is live
  # ============================================================================
  health-check:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for containers to stabilise
        run: sleep 30

      - name: Check Nginx / frontend
        run: |
          curl -f --retry 5 --retry-delay 10 \
            http://${{ secrets.EC2_HOST }}/health \
            && echo "✅ Nginx healthy" \
            || echo "⚠️  Nginx health check pending"

      - name: Check backend API
        run: |
          curl -f --retry 5 --retry-delay 10 \
            http://${{ secrets.EC2_HOST }}/api/health \
            && echo "✅ Backend healthy" \
            || echo "⚠️  Backend health check pending"
